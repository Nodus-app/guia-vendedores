<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>611 Logistica - Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0c10;--bg2:#111318;--bg3:#191d26;
  --brd:#252a38;
  --tx:#e8ecf8;--tx2:#8b93ac;--tx3:#4d5571;
  --bl:#4f8ef5;
  --rd:#f54f4f;--rd-l:#ffaaaa;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--tx);
  font-family:'Sora',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.login-box{width:100%;max-width:320px}
.login-logo{text-align:center;margin-bottom:28px}
.login-ico{display:inline-flex;align-items:center;justify-content:center;
  width:56px;height:56px;border-radius:16px;background:var(--bg3);
  font-size:26px;margin-bottom:14px}
.login-t{font-size:22px;font-weight:700}
.login-s{font-size:11px;color:var(--tx3);margin-top:4px;font-family:'DM Mono',monospace}
.login-form{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:22px}
.lbl{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px}
.lbl:first-child{margin-top:0}
.inp{width:100%;background:var(--bg3);border:1px solid var(--brd);color:var(--tx);
  border-radius:10px;padding:11px 14px;font-size:15px;outline:none;font-family:'DM Mono',monospace}
.inp:focus{border-color:var(--bl)}
.err-box{color:var(--rd-l);font-size:12px;margin-top:10px;display:none}
.btn-pri{width:100%;margin-top:18px;background:var(--bl);color:#fff;border:none;
  border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif}
.btn-pri:active{opacity:.85}
.login-hint{text-align:center;margin-top:14px;font-size:11px;color:var(--tx3)}
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">
    <div class="login-ico">🔑</div>
    <div class="login-t">611 Logistica</div>
    <div class="login-s">Acceso al sistema</div>
  </div>
  <div class="login-form">
    <div class="lbl">Usuario</div>
    <input type="text" id="inp-user" class="inp" placeholder="Numero de vendedor o usuario"
      inputmode="text"
      onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()">
    <div class="lbl">Contrasena</div>
    <input type="password" id="inp-pass" class="inp" placeholder="****"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err-box" id="login-err"></div>
    <button class="btn-pri" onclick="doLogin()">Ingresar</button>
  </div>
  <div class="login-hint">Vendedores: tu numero y tu contrasena habitual</div>
</div>

<script>
function doLogin(){
  var u=(document.getElementById('inp-user').value||'').trim();
  var p=document.getElementById('inp-pass').value||'';
  var e=document.getElementById('login-err');

  // Supervisor
  if(u.toLowerCase()==='sup'){
    if(p==='sup1'){
      window.location.href='mas_analytics_v9.html';
      return;
    }
    e.textContent='Usuario o contrasena incorrectos';
    e.style.display='block';
    return;
  }

  // Vendedor: no repetimos la lista de vendedores validos aca (vive en guia_visita_611.html
  // y cambia con los datos). Pasamos los datos y dejamos que esa pagina valide de verdad.
  if(/^\d+$/.test(u)){
    sessionStorage.setItem('auto_vend', u);
    sessionStorage.setItem('auto_pass', p);
    window.location.href='guia_visita_611.html';
    return;
  }

  e.textContent='Usuario o contrasena incorrectos';
  e.style.display='block';
}
</script>

</body>
</html>
